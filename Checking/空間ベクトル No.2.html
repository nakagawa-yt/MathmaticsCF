<!doctype html>
<html lang="ja" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Zen Maru Gothic', sans-serif; }
    @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    @keyframes confetti { 0% { transform: translateY(0) rotate(0deg); opacity:1; } 100% { transform: translateY(-60px) rotate(360deg); opacity:0; } }
    .pop-in { animation: popIn 0.4s ease-out forwards; }
    .shake { animation: shake 0.3s ease-in-out; }
    .confetti-burst::after { content: '🎉'; position: absolute; top: -20px; right: -10px; animation: confetti 0.8s ease-out forwards; font-size: 1.5rem; }
    .bubble { position: absolute; border-radius: 50%; opacity: 0.12; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto relative" style="background: #FFF0F5;">
   <!-- Decorative bubbles -->
   <div class="bubble" style="width:120px;height:120px;background:#FF6B9D;top:5%;left:-30px;"></div>
   <div class="bubble" style="width:80px;height:80px;background:#4ECDC4;top:15%;right:10px;"></div>
   <div class="bubble" style="width:60px;height:60px;background:#FFE66D;bottom:20%;left:10%;"></div>
   <div class="bubble" style="width:100px;height:100px;background:#A78BFA;bottom:5%;right:5%;"></div><!-- Start Screen -->
   <div id="screen-start" class="flex flex-col items-center justify-center h-full px-4 relative z-10">
    <div class="text-center pop-in">
     <div style="font-size:4rem;" class="mb-2">
      ⭕
     </div>
     <h1 id="main-title" class="text-4xl md:text-5xl font-black mb-2" style="color:#FF6B9D;">円マスター</h1>
     <p id="main-subtitle" class="text-lg font-bold mb-8" style="color:#A78BFA;">3問チャレンジ 🚀</p><button onclick="startQuiz()" class="px-8 py-4 rounded-full text-white font-bold text-xl shadow-lg hover:scale-105 transition-transform" style="background: linear-gradient(135deg, #FF6B9D, #A78BFA);"> スタート！ </button>
    </div>
   </div><!-- Quiz Screen -->
   <div id="screen-quiz" class="hidden flex flex-col items-center justify-center h-full px-4 relative z-10">
    <div class="w-full max-w-lg">
     <!-- Progress -->
     <div class="flex justify-center gap-3 mb-6">
      <span id="dot-0" class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm" style="background:#ddd;">1</span> <span id="dot-1" class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm" style="background:#ddd;">2</span> <span id="dot-2" class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm" style="background:#ddd;">3</span>
     </div><!-- Question Card -->
     <div id="q-card" class="rounded-3xl p-6 md:p-8 shadow-xl pop-in" style="background:white;">
      <p id="q-label" class="text-sm font-bold mb-1" style="color:#A78BFA;"></p>
      <h2 id="q-text" class="text-lg md:text-xl font-bold mb-2" style="color:#333;"></h2>
      <div id="q-equation" class="text-center py-3 px-4 rounded-2xl mb-5 text-xl md:text-2xl font-black" style="background:#FFF0F5;color:#FF6B9D;"></div>
      <div id="q-inputs" class="space-y-3"></div>
      <div id="q-feedback" class="mt-4 text-center font-bold text-lg hidden"></div>
      <div class="flex justify-center mt-5">
       <button id="btn-check" onclick="checkAnswer()" class="px-6 py-3 rounded-full text-white font-bold shadow-md hover:scale-105 transition-transform" style="background:linear-gradient(135deg,#4ECDC4,#44B09E);"> 答え合わせ ✅ </button> <button id="btn-next" onclick="nextQuestion()" class="hidden px-6 py-3 rounded-full text-white font-bold shadow-md hover:scale-105 transition-transform" style="background:linear-gradient(135deg,#FF6B9D,#A78BFA);"> 次へ ➡️ </button>
      </div>
     </div>
    </div>
   </div><!-- Result Screen -->
   <div id="screen-result" class="hidden flex flex-col items-center justify-center h-full px-4 relative z-10">
    <div class="text-center pop-in bg-white rounded-3xl p-8 md:p-10 shadow-xl max-w-md w-full">
     <div id="result-emoji" class="text-6xl mb-3"></div>
     <h2 class="text-2xl font-black mb-2" style="color:#333;">結果発表！</h2>
     <p id="result-score" class="text-4xl font-black mb-4" style="color:#FF6B9D;"></p>
     <p id="result-msg" class="text-lg font-bold mb-6" style="color:#A78BFA;"></p><button onclick="resetQuiz()" class="px-8 py-3 rounded-full text-white font-bold shadow-md hover:scale-105 transition-transform" style="background:linear-gradient(135deg,#FF6B9D,#A78BFA);"> もう一度 🔄 </button>
    </div>
   </div>
  </div>
  <script>
  const dotColors = ['#FF6B9D','#4ECDC4','#A78BFA'];
  const questions = [
    {
      label: '第１問',
      text: '次の円の中心と半径を求めよう！',
      equation: '(x − 3)² + (y + 2)² = 16',
      inputs: [
        { id:'q1_cx', label:'中心の x 座標', answer:'3' },
        { id:'q1_cy', label:'中心の y 座標', answer:'-2' },
        { id:'q1_r',  label:'半径', answer:'4' }
      ]
    },
    {
      label: '第２問',
      text: '中心 (1, 3) を通り、点 (4, 7) を通る円の半径を求めよう！',
      equation: '中心 (1, 3)　通過点 (4, 7)',
      inputs: [
        { id:'q2_r', label:'半径', answer:'5' }
      ]
    },
    {
      label: '第３問',
      text: '点 A(−2, 3) と 点 B(6, −5) を直径の両端とする円の中心を求めよう！',
      equation: 'A(−2, 3)　B(6, −5)',
      inputs: [
        { id:'q3_cx', label:'中心の x 座標', answer:'2' },
        { id:'q3_cy', label:'中心の y 座標', answer:'-1' }
      ]
    }
  ];

  let current = 0, score = 0;

  function show(id) {
    ['screen-start','screen-quiz','screen-result'].forEach(s => {
      document.getElementById(s).classList.toggle('hidden', s !== id);
    });
  }

  function startQuiz() { current = 0; score = 0; updateDots(); loadQuestion(); show('screen-quiz'); }

  function updateDots() {
    for (let i = 0; i < 3; i++) {
      const d = document.getElementById('dot-' + i);
      d.style.background = i <= current ? dotColors[i] : '#ddd';
    }
  }

  function loadQuestion() {
    const q = questions[current];
    document.getElementById('q-label').textContent = q.label;
    document.getElementById('q-text').textContent = q.text;
    document.getElementById('q-equation').textContent = q.equation;
    const container = document.getElementById('q-inputs');
    container.innerHTML = '';
    q.inputs.forEach(inp => {
      const div = document.createElement('div');
      div.className = 'flex items-center gap-3';
      div.innerHTML = `<label class="text-sm font-bold whitespace-nowrap" style="color:#555;min-width:100px;">${inp.label}</label>
        <input id="${inp.id}" type="text" inputmode="numeric" class="flex-1 border-2 rounded-xl px-4 py-2 text-lg font-bold text-center outline-none focus:border-pink-400 transition" style="border-color:#e0e0e0;" placeholder="？">`;
      container.appendChild(div);
    });
    document.getElementById('q-feedback').classList.add('hidden');
    document.getElementById('btn-check').classList.remove('hidden');
    document.getElementById('btn-next').classList.add('hidden');
    updateDots();
    // Re-animate card
    const card = document.getElementById('q-card');
    card.classList.remove('pop-in');
    void card.offsetWidth;
    card.classList.add('pop-in');
  }

  function checkAnswer() {
    const q = questions[current];
    let correct = true;
    q.inputs.forEach(inp => {
      const el = document.getElementById(inp.id);
      const val = el.value.replace(/\s/g,'');
      if (val === inp.answer) {
        el.style.borderColor = '#4ECDC4';
        el.style.background = '#E6FFF9';
      } else {
        el.style.borderColor = '#FF6B9D';
        el.style.background = '#FFF0F5';
        correct = false;
      }
    });
    const fb = document.getElementById('q-feedback');
    fb.classList.remove('hidden');
    if (correct) {
      score++;
      fb.textContent = '正解！すごい！🎉';
      fb.style.color = '#4ECDC4';
      fb.classList.add('confetti-burst');
      fb.style.position = 'relative';
    } else {
      fb.innerHTML = '惜しい！正解は → ' + q.inputs.map(i => `${i.label}: <b>${i.answer}</b>`).join('、');
      fb.style.color = '#FF6B9D';
      fb.classList.remove('confetti-burst');
      const card = document.getElementById('q-card');
      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 400);
    }
    document.getElementById('btn-check').classList.add('hidden');
    document.getElementById('btn-next').classList.remove('hidden');
  }

  function nextQuestion() {
    current++;
    if (current >= 3) { showResult(); return; }
    loadQuestion();
  }

  function showResult() {
    show('screen-result');
    document.getElementById('result-score').textContent = score + ' / 3';
    const msgs = [
      ['😅','次はきっと大丈夫！復習してみよう！'],
      ['😊','いい調子！あと少しで完璧！'],
      ['🥳','素晴らしい！もう少し！'],
      ['🏆','パーフェクト！球でもがんばって！']
    ];
    const m = msgs[score];
    document.getElementById('result-emoji').textContent = m[0];
    document.getElementById('result-msg').textContent = m[1];
  }

  function resetQuiz() { startQuiz(); show('screen-start'); }

  // Element SDK
  const defaultConfig = {
    app_title: '円の方程式',
    subtitle: '球に向けて復習しよう 🚀',
    background_color: '#FFF0F5',
    primary_color: '#FF6B9D',
    text_color: '#333333',
    accent_color: '#A78BFA',
    surface_color: '#FFFFFF',
    font_family: 'Zen Maru Gothic',
    font_size: 16
  };

  function applyConfig(config) {
    const bg = config.background_color || defaultConfig.background_color;
    const primary = config.primary_color || defaultConfig.primary_color;
    const text = config.text_color || defaultConfig.text_color;
    const accent = config.accent_color || defaultConfig.accent_color;
    const surface = config.surface_color || defaultConfig.surface_color;
    const font = config.font_family || defaultConfig.font_family;
    const size = config.font_size || defaultConfig.font_size;

    document.getElementById('app').style.background = bg;
    document.getElementById('main-title').textContent = config.app_title || defaultConfig.app_title;
    document.getElementById('main-title').style.color = primary;
    document.getElementById('main-subtitle').textContent = config.subtitle || defaultConfig.subtitle;
    document.getElementById('main-subtitle').style.color = accent;

    document.querySelectorAll('#q-card, .bg-white, #screen-result > div > div, #screen-result div.bg-white').forEach(el => {
      if (el) el.style.background = surface;
    });
    document.getElementById('q-text').style.color = text;
    document.getElementById('q-label').style.color = accent;
    document.getElementById('q-equation').style.background = bg;
    document.getElementById('q-equation').style.color = primary;

    document.body.style.fontFamily = `${font}, sans-serif`;
    document.querySelectorAll('h1,h2,p,label,button,span,input').forEach(el => {
      el.style.fontFamily = `${font}, sans-serif`;
    });
  }

  if (window.elementSdk) {
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => applyConfig(config),
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_color || defaultConfig.primary_color, set: v => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
          { get: () => config.accent_color || defaultConfig.accent_color, set: v => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['app_title', config.app_title || defaultConfig.app_title],
        ['subtitle', config.subtitle || defaultConfig.subtitle]
      ])
    });
  }

  lucide.createIcons();
</script>

</html>
