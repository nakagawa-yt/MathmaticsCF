  <style>
    * { font-family: 'Zen Maru Gothic', sans-serif; }
    .mono { font-family: 'Fira Code', monospace; }

    .vec::after { content: '→'; position: absolute; top: -0.55em; left: 0.1em; font-size: 0.7em; }
    .vec { position: relative; display: inline-block; padding-top: 0.4em; }

    .fraction { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 2px; }
    .fraction .num { border-bottom: 2px solid currentColor; padding: 0 4px 2px; line-height: 1.2; }
    .fraction .den { padding: 2px 4px 0; line-height: 1.2; }

    .input-fraction { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 4px; }
    .input-fraction input {
      width: 3rem; text-align: center; font-family: 'Fira Code', monospace;
      font-size: 1.1rem; font-weight: 600; border: none; outline: none;
      background: transparent; color: inherit; padding: 2px 0;
    }
    .input-fraction .frac-line { width: 100%; height: 2px; background: currentColor; }

    .sparkle {
      animation: sparkle 0.6s ease-out forwards;
    }
    @keyframes sparkle {
      0% { transform: scale(0.8); opacity: 0; }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }

    .shake { animation: shake 0.4s ease-in-out; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    .slide-in { animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideIn {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .confetti-container { pointer-events: none; position: fixed; inset: 0; z-index: 50; overflow: hidden; }
    .confetti-piece {
      position: absolute; width: 10px; height: 10px; border-radius: 2px;
      animation: confettiFall 2.5s ease-out forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100%) rotate(720deg); opacity: 0; }
    }

    .progress-ring { transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

    .glow-pulse {
      animation: glowPulse 2s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 158, 198, 0.15); }
      50% { box-shadow: 0 0 35px rgba(255, 158, 198, 0.25); }
    }

    .checkbox-custom {
      appearance: none; width: 24px; height: 24px; border: 2px solid #ff9ec6;
      border-radius: 6px; cursor: pointer; transition: all 0.3s;
      background: white;
    }
    .checkbox-custom:checked {
      background: #ff9ec6; box-shadow: inset 0 0 0 2px white;
    }
    .checkbox-custom:focus { outline: none; box-shadow: 0 0 0 3px rgba(255, 158, 198, 0.3); }
  </style>

      theme: {

     <div class="flex items-center gap-4">

       <circle cx="28" cy="28" r="24" fill="none" stroke="rgba(74,74,74,0.1)" stroke-width="4" /> <circle id="progress-ring" cx="28" cy="28" r="24" fill="none" stroke="#ff9ec6" stroke-width="4" stroke-linecap="round" class="progress-ring" stroke-dasharray="150.8" stroke-dashoffset="150.8" />

     <button onclick="resetAll()" class="bg-accent hover:bg-accent/80 text-white font-bold px-8 py-3 rounded-full transition-all hover:scale-105 active:scale-95"> <i data-lucide="rotate-ccw" style="width:18px;height:18px;display:inline;vertical-align:-3px"></i> もう一度チャレンジ </button>

       <p class="text-surface/60 mb-4">解き終わったらFormに入力してね！</p><a href="https://forms.gle/EdwCpPheRNCw83CQ6" target="_blank" rel="noopener noreferrer" class="inline-block bg-accent hover:bg-accent/80 text-white font-bold px-6 py-3 rounded-full transition-all hover:scale-105 active:scale-95"> <i data-lucide="external-link" style="width:18px;height:18px;display:inline;vertical-align:-3px;margin-right:8px"></i>Formに入力 </a>

  <script>
const defaultConfig = {
  main_title: '位置ベクトルの復習',
  subtitle: '内分点・外分点・一直線',
  background_color: '#f0f9f7',
  surface_color: '#fffbf0',
  text_color: '#4a4a4a',
  accent_color: '#ff9ec6',
  secondary_color: '#ffd700',
  font_family: 'Zen Maru Gothic',
  font_size: 16,
};

const questions = [
  {
    id: 1,
    label: '第１問',
    desc: '線分ABを <strong class="text-accent">2 : 5</strong> に内分する点Pの位置ベクトルを求めよ。',
    m: 2, n: 5,
    ansA: { num: 5, den: 7 },
    ansB: { num: 2, den: 7 },
    hint: '内分点の公式：$m:n$ に内分 $\\to$ $\\frac{n\\vec{a} + m\\vec{b}}{m+n}$',
    type: 'fraction',
  },
  {
    id: 2,
    label: '第２問',
    desc: '線分ABを <strong class="text-accent">3 : 1</strong> に外分する点Rの位置ベクトルを求めよ。',
    m: 3, n: 1,
    isExternalDivision: true,
    ansA: { num: -1, den: 2 },
    ansB: { num: 3, den: 2 },
    hint: '外分点の公式：$m:n$ に外分 $\\to$ $\\frac{-n\\vec{a} + m\\vec{b}}{m-n}$',
    type: 'fraction',
  },
  {
    id: 3,
    label: '第３問',
    desc: '3点 A, F, E が一直線上にあることを示している式をすべて選べ。',
    type: 'multiselect',
    hint: '3点が一直線上にあるなら、一方が他方のスカラー倍になっています。',
    options: [
      { id: 'a', text: 'a:<span class="vec">FE</span> = <span class="vec">AE</span> + <span class="vec">AF</span>', correct: false },
      { id: 'b', text: 'b:<span class="vec">AF</span> = 5<span class="vec">AE</span>', correct: true },
      { id: 'c', text: 'c:<span class="vec">AE</span> = 3+ <span class="vec">AF</span>', correct: false },
      { id: 'd', text: 'd:<span class="vec">AF</span> = <span class="fraction" style="display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 2px;"><span class="num" style="border-bottom: 2px solid currentColor; padding: 0 4px 2px; line-height: 1.2;">5</span><span class="den" style="padding: 2px 4px 0; line-height: 1.2;">2</span></span><span class="vec">AD</span>', correct: false },
      { id: 'e', text: 'e:<span class="vec">AF</span> = <span class="fraction" style="display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 2px;"><span class="num" style="border-bottom: 2px solid currentColor; padding: 0 4px 2px; line-height: 1.2;">3</span><span class="den" style="padding: 2px 4px 0; line-height: 1.2;">4</span></span><span class="vec">AE</span>', correct: true },
      { id: 'f', text: 'f:<span class="vec">FE</span> = <span class="fraction" style="display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 2px;"><span class="num" style="border-bottom: 2px solid currentColor; padding: 0 4px 2px; line-height: 1.2;">1</span><span class="den" style="padding: 2px 4px 0; line-height: 1.2;">3</span></span><span class="vec">AD</span>+<span class="fraction" style="display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 2px;"><span class="num" style="border-bottom: 2px solid currentColor; padding: 0 4px 2px; line-height: 1.2;">2</span><span class="den" style="padding: 2px 4px 0; line-height: 1.2;">3</span></span><span class="vec">AE</span>', correct: false },
      { id: 'g', text: 'g:<span class="vec">AF</span> = -<span class="vec">AE</span>', correct: true },
    ]
  },
];

let score = 0;
let solved = new Set();
let currentQuestionIdx = 0;

function buildQuestions() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  
  const q = questions[currentQuestionIdx];
  const idx = currentQuestionIdx;
  const card = document.createElement('div');
  card.id = `card-${q.id}`;
  card.className = 'mb-6 slide-in';
  card.style.animationDelay = `${0.2 + idx * 0.15}s`;
  card.style.opacity = '0';
  
  if (q.type === 'fraction') {
    card.innerHTML = `
    <div class="bg-deep backdrop-blur border border-surface/10 rounded-2xl p-6 glow-pulse" id="card-inner-${q.id}">
      <div class="flex items-center gap-2 mb-3">
        <span class="bg-accent/20 text-accent text-xs font-black px-3 py-1 rounded-full">${q.label}</span>
        <div id="badge-${q.id}" class="hidden">
          <span class="bg-gold/20 text-gold text-xs font-black px-3 py-1 rounded-full sparkle">✓ 正解!</span>
        </div>
      </div>
      <p class="text-surface text-base mb-5 leading-relaxed">${q.desc}</p>

      <!-- Formula display -->
      <div class="bg-ink/95 rounded-xl p-6 md:p-8 mb-6 text-center overflow-x-auto">
        <span class="text-surface/50 text-sm block mb-4">位置ベクトルを求めよう</span>
        <div class="text-surface text-base md:text-lg flex items-center justify-center flex-wrap gap-3 leading-10 min-w-fit md:min-w-0">
          <span class="vec" style="font-style:italic;font-size:1.3em">p</span>
          <span class="text-surface/40 text-xl">=</span>

          <!-- a coefficient -->
          <div class="input-fraction text-accent" id="inputA-${q.id}">
            <input type="number" id="a-num-${q.id}" placeholder="?" aria-label="aの分子" class="border-b-2 border-accent/40 focus:border-accent text-base">
            <div class="frac-line bg-accent/60"></div>
            <input type="number" id="a-den-${q.id}" placeholder="?" aria-label="aの分母" class="border-t-0 text-base">
          </div>
          <span class="vec text-surface" style="font-style:italic;font-size:1.3em">a</span>

          <span class="text-surface/40 text-xl">+</span>

          <!-- b coefficient -->
          <div class="input-fraction text-gold" id="inputB-${q.id}">
            <input type="number" id="b-num-${q.id}" placeholder="?" aria-label="bの分子" class="border-b-2 border-gold/40 focus:border-gold text-base">
            <div class="frac-line bg-gold/60"></div>
            <input type="number" id="b-den-${q.id}" placeholder="?" aria-label="bの分母" class="border-t-0 text-base">
          </div>
          <span class="vec text-surface" style="font-style:italic;font-size:1.3em">b</span>
        </div>
      </div>

      <!-- Hint toggle -->
      <div class="mb-5">
        <button onclick="toggleHint(${q.id})" class="text-surface/40 hover:text-surface/60 text-xs font-bold flex items-center gap-1 transition-colors">
          <i data-lucide="lightbulb" style="width:14px;height:14px"></i> ヒントを見る
        </button>
        <div id="hint-${q.id}" class="hidden mt-3 bg-gold/5 border border-gold/10 rounded-lg p-4 text-surface/60 text-sm hint-content">${q.hint}</div>
      </div>

      <!-- Submit -->
      <div class="flex items-center gap-3 mb-4">
        <button onclick="checkAnswer(${q.id})" id="btn-${q.id}"
          class="bg-accent hover:bg-accent/80 text-white font-bold px-6 py-2.5 rounded-full transition-all hover:scale-105 active:scale-95 text-sm">
          解答する
        </button>
        <span id="msg-${q.id}" class="text-sm font-bold"></span>
      </div>

      <!-- Next button (shown after correct answer) -->
      <button onclick="nextQuestion(${q.id})" id="next-q-btn-${q.id}"
        class="hidden mt-4 bg-gold hover:bg-gold/80 text-surface font-bold px-6 py-2.5 rounded-full transition-all hover:scale-105 active:scale-95 text-sm w-full">
        <i data-lucide="chevron-right" style="width:18px;height:18px;display:inline;vertical-align:-3px"></i> 次へ
      </button>

      <!-- Explanation (hidden until correct) -->
      <div id="explain-${q.id}" class="hidden bg-surface/5 border border-surface/10 rounded-xl p-6 text-center">
        <p class="text-surface/70 text-sm leading-relaxed mb-6"><strong class="text-surface">解説：</strong></p>
        <div class="overflow-x-auto flex justify-center items-center gap-2 mb-4">
          <span id="explain-answer-${q.id}" class="katex-formula" style="display:inline-block"></span>
          <span class="text-surface/40 text-lg">=</span>
          <span id="explain-formula-${q.id}" class="katex-formula" style="display:inline-block"></span>
        </div>
        <p class="text-surface/60 text-xs mt-4 leading-relaxed">
          つまり、ベクトル<span class="vec" style="font-style:italic;">a</span>の係数は<span class="text-accent font-bold">${q.ansA.num}/${q.ansA.den}</span>、ベクトル<span class="vec" style="font-style:italic;">b</span>の係数は<span class="text-gold font-bold">${q.ansB.num}/${q.ansB.den}</span>
        </p>
      </div>
    </div>
  `;
  } else if (q.type === 'multiselect') {
    const optionsHtml = q.options.map(opt => `
      <label class="flex items-center gap-3 p-3 rounded-lg hover:bg-accent/5 transition-colors cursor-pointer">
        <input type="checkbox" class="checkbox-custom multiselect-option" id="opt-${q.id}-${opt.id}" data-correct="${opt.correct}">
        <span class="text-surface text-sm">${opt.text}</span>
      </label>
    `).join('');
    
    card.innerHTML = `
    <div class="bg-deep backdrop-blur border border-surface/10 rounded-2xl p-6 glow-pulse" id="card-inner-${q.id}">
      <div class="flex items-center gap-2 mb-3">
        <span class="bg-accent/20 text-accent text-xs font-black px-3 py-1 rounded-full">${q.label}</span>
        <div id="badge-${q.id}" class="hidden">
          <span class="bg-gold/20 text-gold text-xs font-black px-3 py-1 rounded-full sparkle">✓ 正解!</span>
        </div>
      </div>
      <p class="text-surface text-base mb-5 leading-relaxed">${q.desc}</p>

      <!-- Options -->
      <div class="bg-ink/95 rounded-xl p-5 md:p-6 mb-6 space-y-2" id="options-${q.id}">
        ${optionsHtml}
      </div>

      <!-- Hint toggle -->
      <div class="mb-5">
        <button onclick="toggleHint(${q.id})" class="text-surface/40 hover:text-surface/60 text-xs font-bold flex items-center gap-1 transition-colors">
          <i data-lucide="lightbulb" style="width:14px;height:14px"></i> ヒントを見る
        </button>
        <div id="hint-${q.id}" class="hidden mt-3 bg-gold/5 border border-gold/10 rounded-lg p-4 text-surface/60 text-sm hint-content">${q.hint}</div>
      </div>

      <!-- Submit -->
      <div class="flex items-center gap-3 mb-4">
        <button onclick="checkAnswerMulti(${q.id})" id="btn-${q.id}"
          class="bg-accent hover:bg-accent/80 text-white font-bold px-6 py-2.5 rounded-full transition-all hover:scale-105 active:scale-95 text-sm">
          解答する
        </button>
        <span id="msg-${q.id}" class="text-sm font-bold"></span>
      </div>

      <!-- Next button (shown after correct answer) -->
      <button onclick="nextQuestion(${q.id})" id="next-q-btn-${q.id}"
        class="hidden mt-4 bg-gold hover:bg-gold/80 text-surface font-bold px-6 py-2.5 rounded-full transition-all hover:scale-105 active:scale-95 text-sm w-full">
        <i data-lucide="chevron-right" style="width:18px;height:18px;display:inline;vertical-align:-3px"></i> 次へ
      </button>

      <!-- Explanation (hidden until correct) -->
      <div id="explain-${q.id}" class="hidden bg-surface/5 border border-surface/10 rounded-xl p-5">
        <p class="text-surface/70 text-sm leading-relaxed">
          <strong class="text-surface">解説：</strong><br>
          3点が一直線上にあるとき、それらを結ぶ2つのベクトルは実数倍の関係になります。<br>
          正解：<strong class="text-accent">b, e, g</strong> 
        </p>
      </div>
    </div>
  `;
  }
  
  container.appendChild(card);
  lucide.createIcons();
  
  setTimeout(() => {
    document.querySelectorAll('.hint-content').forEach(el => {
      const text = el.textContent;
      el.innerHTML = text.replace(/\$\$(.*?)\$\$/g, (match, formula) => {
        const span = document.createElement('span');
        try {
          katex.render(formula, span, { throwOnError: false, displayMode: true });
          return span.innerHTML;
        } catch (e) {
          return match;
        }
      }).replace(/\$(.*?)\$/g, (match, formula) => {
        const span = document.createElement('span');
        try {
          katex.render(formula, span, { throwOnError: false, displayMode: false });
          return span.innerHTML;
        } catch (e) {
          return match;
        }
      });
    });
  }, 50);
}

function toggleHint(id) {
  const h = document.getElementById(`hint-${id}`);
  h.classList.toggle('hidden');
}

function checkAnswer(id) {
  if (solved.has(id)) return;
  const q = questions.find(x => x.id === id);
  const aNum = parseInt(document.getElementById(`a-num-${id}`).value);
  const aDen = parseInt(document.getElementById(`a-den-${id}`).value);
  const bNum = parseInt(document.getElementById(`b-num-${id}`).value);
  const bDen = parseInt(document.getElementById(`b-den-${id}`).value);

  if ([aNum, aDen, bNum, bDen].some(isNaN)) {
    showMsg(id, '全部の欄を埋めてね！', false);
    return;
  }
  if (aDen === 0 || bDen === 0) {
    showMsg(id, '分母は0にできないよ！', false);
    return;
  }

  const aOk = aNum * q.ansA.den === q.ansA.num * aDen;
  const bOk = bNum * q.ansB.den === q.ansB.num * bDen;

  if (aOk && bOk) {
    solved.add(id);
    score += 50;
    showMsg(id, '', true);
    document.getElementById(`badge-${id}`).classList.remove('hidden');
    
    const explainDiv = document.getElementById(`explain-${id}`);
    explainDiv.classList.remove('hidden');
    
    // Formula answer
    const formulaDiv = document.getElementById(`explain-formula-${id}`);
    const formulaLatex = `\\frac{${q.ansA.num}}{${q.ansA.den}}\\vec{a} + \\frac{${q.ansB.num}}{${q.ansB.den}}\\vec{b}`;
    try {
      katex.render(formulaLatex, formulaDiv, { displayMode: true, throwOnError: false });
    } catch (e) {
      formulaDiv.textContent = formulaLatex;
    }
    
    // Formula derivation
    const answerDiv = document.getElementById(`explain-answer-${id}`);
    let answerLatex;
    if (q.isExternalDivision) {
      answerLatex = `\\vec{p} = \\frac{-${q.n}\\vec{a} + ${q.m}\\vec{b}}{${q.m}-${q.n}}`;
    } else {
      answerLatex = `\\vec{p} = \\frac{${q.n}\\vec{a} + ${q.m}\\vec{b}}{${q.m}+${q.n}}`;
    }
    try {
      katex.render(answerLatex, answerDiv, { displayMode: true, throwOnError: false });
    } catch (e) {
      answerDiv.textContent = answerLatex;
    }
    
    document.getElementById(`btn-${id}`).disabled = true;
    document.getElementById(`btn-${id}`).classList.add('opacity-40', 'cursor-not-allowed');
    document.getElementById(`card-inner-${id}`).classList.remove('glow-pulse');
    document.getElementById(`card-inner-${id}`).style.borderColor = 'rgba(255,165,0,0.3)';

    ['a-num','a-den','b-num','b-den'].forEach(p => {
      const el = document.getElementById(`${p}-${id}`);
      el.disabled = true; 
      el.classList.add('opacity-60');
    });

    updateProgress();
    document.getElementById(`next-q-btn-${id}`).classList.remove('hidden');
    launchMiniConfetti();
  } else {
    showMsg(id, 'もう一度考えてみよう！', false);
    document.getElementById(`card-${id}`).querySelector('[id^="card-inner-"]').classList.add('shake');
    setTimeout(() => document.getElementById(`card-${id}`).querySelector('[id^="card-inner-"]').classList.remove('shake'), 500);
  }
}

function checkAnswerMulti(id) {
  if (solved.has(id)) return;
  const q = questions.find(x => x.id === id);
  
  const checkboxes = document.querySelectorAll(`#card-${id} .multiselect-option`);
  const correctIndices = Array.from(checkboxes)
    .map((cb, i) => (cb.dataset.correct === 'true' ? i : -1))
    .filter(i => i !== -1);
  
  const selectedIndices = Array.from(checkboxes)
    .map((cb, i) => (cb.checked ? i : -1))
    .filter(i => i !== -1);
  
  const correct = JSON.stringify(selectedIndices.sort()) === JSON.stringify(correctIndices.sort());
  
  if (correct) {
    solved.add(id);
    score += 50;
    showMsg(id, '', true);
    document.getElementById(`badge-${id}`).classList.remove('hidden');
    document.getElementById(`explain-${id}`).classList.remove('hidden');
    document.getElementById(`btn-${id}`).disabled = true;
    document.getElementById(`btn-${id}`).classList.add('opacity-40', 'cursor-not-allowed');
    document.getElementById(`card-inner-${id}`).classList.remove('glow-pulse');
    document.getElementById(`card-inner-${id}`).style.borderColor = 'rgba(255,165,0,0.3)';
    
    checkboxes.forEach(cb => cb.disabled = true);
    
    updateProgress();
    document.getElementById(`next-q-btn-${id}`).classList.remove('hidden');
    launchMiniConfetti();
  } else {
    showMsg(id, 'もう一度確認してみよう！', false);
    document.getElementById(`card-${id}`).querySelector('[id^="card-inner-"]').classList.add('shake');
    setTimeout(() => document.getElementById(`card-${id}`).querySelector('[id^="card-inner-"]').classList.remove('shake'), 500);
  }
}

function showMsg(id, text, success) {
  const el = document.getElementById(`msg-${id}`);
  if (success) {
    el.innerHTML = '<span class="text-gold sparkle">🌟 パーフェクト！</span>';
  } else {
    el.innerHTML = `<span class="text-accent/70">${text}</span>`;
    setTimeout(() => el.innerHTML = '', 2500);
  }
}

function updateProgress() {
  const pct = solved.size / questions.length;
  const ring = document.getElementById('progress-ring');
  ring.style.strokeDashoffset = 150.8 * (1 - pct);
  document.getElementById('progress-text').textContent = `${solved.size} / ${questions.length}`;
}

function showCompletion() {
  document.getElementById('completion').classList.remove('hidden');
  document.getElementById('final-msg').textContent = score === 150 ? 'カンペキ！ 🏆' : `スコア: ${score}点！`;
  document.getElementById('score-display').textContent = score;
  launchConfetti();
}

function launchMiniConfetti() {
  const zone = document.getElementById('confetti-zone');
  zone.classList.remove('hidden');
  const colors = ['#ff9ec6','#ffd700','#90ee90','#87ceeb','#ffd4a3'];
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = `${30 + Math.random() * 40}%`;
    p.style.top = '-10px';
    p.style.background = colors[i % colors.length];
    p.style.animationDelay = `${Math.random() * 0.3}s`;
    zone.appendChild(p);
  }
  setTimeout(() => { zone.innerHTML = ''; zone.classList.add('hidden'); }, 3000);
}

function launchConfetti() {
  const zone = document.getElementById('confetti-zone');
  zone.classList.remove('hidden');
  const colors = ['#ff9ec6','#ffd700','#90ee90','#87ceeb','#ffd4a3','#f0bfff'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = `${Math.random() * 100}%`;
    p.style.top = '-10px';
    p.style.width = `${6 + Math.random() * 8}px`;
    p.style.height = `${6 + Math.random() * 8}px`;
    p.style.background = colors[i % colors.length];
    p.style.animationDelay = `${Math.random() * 0.8}s`;
    zone.appendChild(p);
  }
  setTimeout(() => { zone.innerHTML = ''; zone.classList.add('hidden'); }, 4000);
}

function resetAll() {
  score = 0; 
  solved.clear();
  currentQuestionIdx = 0;
  updateProgress();
  document.getElementById('completion').classList.add('hidden');
  document.getElementById('questions-container').classList.remove('hidden');
  document.getElementById('questions-container').innerHTML = '';
  buildQuestions();
}

function nextQuestion(id) {
  if (currentQuestionIdx < questions.length - 1) {
    currentQuestionIdx++;
    buildQuestions();
    document.getElementById('questions-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    document.getElementById('questions-container').classList.add('hidden');
    showCompletion();
  }
}

buildQuestions();
updateProgress();

  }
